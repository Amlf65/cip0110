<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Título</title>
  <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1">
  <link rel="stylesheet" href="00plantillajs.css">
  <style>
    #imagen1 {
      opacity: 0.5;
    }
  </style>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>

    $(document).ready(function () {
      $("#imagen").click(function () {
        $(this).animate({
          marginLeft: "+=550px"
        }, 1500);
      })

      $("#imagen1").mouseover(function () {
        $(this).animate({
          opacity: "1"
        }, 250);
      })
      $("#imagen1").mouseout(function () {
        $(this).animate({
          opacity: "0.5"
        }, 250);
      })
    });


  </script>
</head>

<body>
  <img src="img/coche.png" width="300" height="200" id="imagen">
  <br />
  <img src="img/foto5.jpg" width="300" height="200" id="imagen1">

</body>

</html>
