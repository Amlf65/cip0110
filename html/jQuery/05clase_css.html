<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Título</title>
    <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1">
    <link rel="stylesheet" href="00plantillajs.css">
    <style>
        .test {
            background-color: red;
            color:white;
        }
        .real {
            font-family: arial;
        }

    </style>
    <!-- <script src="jquery19.js"></script> -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" ></script>
    <script>
        $(function() {
            $("#test").on("click", function() {
                $(this).addClass("test");
            });
            $("#notest").on("click", function() {
                $(this).removeClass("real");
            });
            $("#salta").on("click", function() {
                $(this).toggleClass("test");
            });
        });

    </script>
</head>

<body>
    <header>
        <p class="logo">Ejercicios JavaScript CIP</p>
    </header>
    <section>
       
        <div id="test"><h2>Click on me</h2></div>
        <div id ="notest" class="real"><h2>Click on me</h2></div>
        <div id ="salta"><h2>Click on me</h2></div>
    </section>
</body>

</html>
