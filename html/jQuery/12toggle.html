<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Título</title>
    <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1">
    <link rel="stylesheet" href="00plantillajs.css">
    <style>
        body {
            background-color: #6f2a3a;
        }

        #menu_principal {

            width: 80%;
            margin: 100px 10%;

        }


        li {
            float: left;
            width: 200px;
            list-style: none;
            margin: 10px 0px;
            text-align: center;
            border: solid 1px #000;
        }

        #submenu1 li {
            float: left;
            width: 200px;
            list-style: none;
            margin: 0px 0px;
            text-align: center;

        }

        li a {


            border: 1px thin;
            display: block;
            font-size: 24px;
            color: #FFF;
            font-weight: bold;
            padding: 10px 30px;
            text-decoration: none;

            background: -moz-linear-gradient(top, #1e5799 0%, #2989d8 50%, #207cca 51%, #7db9e8 100%);

            background: -webkit-gradient(linear, left top, left bottom, color-stop(0%, #1e5799), color-stop(50%, #2989d8), color-stop(51%, #207cca), color-stop(100%, #7db9e8));

        }



        #submenu1 {

            width: 200px;
            height: 131px;
            z-index: 1;
        }

        #submenu1 a {

            background: -moz-linear-gradient(top, #58b724 0%, #6fd868 51%, #ace2b8 100%);
            background: -webkit-gradient(linear, left top, left bottom, color-stop(0%, #58b724), color-stop(51%, #6fd868), color-stop(100%, #ace2b8));


        }
    </style>
   <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

    <script>
        $(function() {

            $("#submenu1").hide();
            $("#Arc").on("click",function() {
                console.log("has pulsado Archivo")
                $("#submenu1").toggle();
            })


            $("#opcion1").on("click",function() {
                console.log("has pulsado opcion 1")
            });
            $("#opcion2").on("click",function() {
                console.log("has pulsado opcion 2")
            });
            $("#opcion3").on("click",function() {
                console.log("has pulsado opcion 3")
            });
             $("#Edi").on("click",function() {
                console.log("has pulsado Edición")
                $("#submenu1").hide();
            });
             $("#Her").on("click",function() {
                console.log("has pulsado Herramientas")
                $("#submenu1").hide();
            });
            // $("#submenu1").hide();
        });
    </script>
</head>

<body>

    <header>
        <p class="logo">Ejercicios JavaScript CIP </p>
    </header>
    <section>
        <h1>Utillizando la función toggle</h1>

        <div id="menu_principal">

            <ul>

                <li id="Arc"><a href="#">Archivo</a>
                    <div id="submenu1">

                        <ul>

                            <li id="opcion1"><a href="#">Opción 1</a></li>
                            <li id="opcion2"><a href="#">Opción 2</a></li>
                            <li id="opcion3"><a href="#">Opción 3</a></li>

                        </ul>

                    </div>
                </li>
                <li id="Edi"><a href="#">Edición</a></li>
                <li id="Her"><a href="#">Herramientas</a></li>

            </ul>


        </div>

    </section>
</body>
</html>
