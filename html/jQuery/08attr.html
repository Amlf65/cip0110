<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Título</title>
    <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1">
    <link rel="stylesheet" href="00plantillajs.css">
    <style type="text/css">
        #contenedor1 {
            margin-top:5%;
            float:left;
            width:20%;
        }
        #contenedor2 {
            margin-top:5%;
            float:left;
            width:20%;
        }

        ul{
            list-style:none;
            
        }
        li{
            margin:10px 0;
            font-size:24px;
            width:95px;
        }

        .destacar{
            background-color:#F00;
            color:#FFF;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" ></script>
    <script>
        $(document).ready(function(){

                $("li").on({"mouseover":pon_imagen,"mouseout":quita_imagen})  
        });
        function pon_imagen(e){
            if(e.target==elem1){
              $("#elem1").addClass("destacar");
                $("img").attr("src","foto0.svg");
            }else if(e.target==elem2){
                $("#elem2").addClass("destacar");
                $("img").attr("src","foto1.svg");
            }else{
                $("#elem3").addClass("destacar");
                $("img").attr("src","foto2.svg");
            }         
        }
        
        
        function quita_imagen(e) {
            if(e.target==elem1){
              $("#elem1").removeClass("destacar");
                $("img").removeAttr("src");
            }else if(e.target==elem2){
                $("#elem2").removeClass("destacar");
                $("img").removeAttr("src");
            }else{
                $("#elem3").removeClass("destacar");
                $("img").removeAttr("src");
            }
        }
        
    </script>

</head>

<body>
    <header>
        <p class="logo">Manejando removeAttr...</p>
    </header>
    <section>
    <div id="contenedor1">

<ul>

<li id="elem1">Imagen 1</li>
<li id="elem2">Imagen 2</li>
<li id="elem3">Imagen 3</li>


</ul>
</div>
<div id="contenedor2">
<img src="" width=100%>
</div>
    
    </section>
</body>

</html>
