<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Confección páginas web - CIP - 2023">
<title></title>
<link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
<link rel="stylesheet" href="css/.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<style>
    .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: none;
    align-items: center;
    justify-content: center;
}
.thumbnail, .large {
    max-width: 100%;
}

</style>
</head>
<body>
    <div class="gallery">
        <img class="thumbnail" src="../img/foto_queen_tb.PNG" alt="Imagen 1">
        <div class="overlay">
            <img class="large" src="../img/foto_queen.PNG" alt="Imagen 1">
        </div>
    </div>
<script>
    document.querySelector('.thumbnail').addEventListener('click', function() {
    var overlay = document.querySelector('.overlay');
    overlay.style.display = 'flex';
    overlay.style.opacity = 0;
    setTimeout(function() {
        overlay.style.transition = 'opacity 0.5s';
        overlay.style.opacity = 1;
    }, 50); // Timeout to ensure opacity starts at 0
});
document.querySelector('.overlay').addEventListener('click', function() {
    var overlay = this;
    overlay.style.opacity = 0;
    setTimeout(function() {
        overlay.style.display = 'none';
    }, 500); // Match the transition duration
});

</script>    
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js" ></script>
</body>
</html>
