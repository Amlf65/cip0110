<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Confección páginas web - CIP - 2023">
    <title></title>
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="css/.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        /* Estilo para las miniaturas */
        .thumbnails img {
            width: 100px;
            height: auto;
            margin: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .thumbnails img:hover {
            transform: scale(1.1);
        }

        /* Estilos para el modal */
        .modal {
            display: none;
            position: fixed;
            top: 30%;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 700px;
            max-height: 90vh;
        }

        .close {
            position: absolute;
            top: 10px;
            right: 25px;
            color: white;
            font-size: 35px;
            cursor: pointer;
        }
        .thumbnails-wrapper {
            overflow: hidden;
            width: 100%; /* o el ancho que desees para el contenedor visible de las miniaturas */
            margin: 0 auto;
            border:1px solid green;
        }

        .thumbnails {
            white-space: nowrap;
            transition: transform 0.4s;
            float: left;
            border:1px solid red;
            width: 90%;
        }

        button#prev, button#next {
            cursor: pointer;
            width: 4%;
            float: left;
            border:1px solid blue;  
        }

    </style>
</head>

<body>
    
    <div class="thumbnails-wrapper">
       <button id="prev">←</button>
        <div class="thumbnails"> 
            <img src="../img/foto1.png" alt="Imagen 1">
            <img src="../img/foto2.png" alt="Imagen 2">
            <img src="../img/foto1.png" alt="Imagen 1">
            <img src="../img/foto2.png" alt="Imagen 2">
            <img src="../img/foto1.png" alt="Imagen 1">
            <img src="../img/foto2.png" alt="Imagen 2">
            <img src="../img/foto1.png" alt="Imagen 1">
            <img src="../img/foto2.png" alt="Imagen 2">
            <img src="../img/foto1.png" alt="Imagen 1">
            <img src="../img/foto2.png" alt="Imagen 2">
            <img src="../img/foto1.png" alt="Imagen 1">
            <img src="../img/foto2.png" alt="Imagen 2">
            <!-- ... añade más imágenes según lo necesario -->
        </div>
        <button id="next">→</button>
    </div>
    
    <!-- Modal para mostrar la imagen ampliada -->

    <div class="modal" id="imageModal">
        <span class="close">&times;</span>
        <img class="modal-content" id="modalImage">
        <div id="caption"></div>
    </div>

    <script>
        $(document).ready(function () {
            // Al hacer clic en una miniatura
            $(".thumbnails img").click(function () {
                $("#modalImage").attr('src', $(this).attr('src'));
                $("#imageModal").css('display', 'block');
            });

            // Al hacer clic en el botón de cierre
            $(".close").click(function () {
                $("#imageModal").css('display', 'none');
            });
            var currentPosition = 0;
            var scrollAmount = 200;  // Puedes ajustar esta cantidad según el tamaño de tus miniaturas

            $("#next").click(function() {
                currentPosition -= scrollAmount;
                $(".thumbnails").css("transform", "translateX(" + currentPosition + "px)");
            });

            $("#prev").click(function() {
                currentPosition += scrollAmount;
                $(".thumbnails").css("transform", "translateX(" + currentPosition + "px)");
            });
        });

    </script>
</body>

</html>
