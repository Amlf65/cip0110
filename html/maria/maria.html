<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Confección páginas web - CIP - 2023">
  <title></title>
  <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background-image: url("ACNH.jpg");
      background-repeat: no-repeat;
      background-size: cover;
      background-color: #a3d8e6;
    }

    .topnav {
      overflow: hidden;
      background-color: #81c9a4;
    }

    .topnav a {
      float: left;
      display: block;
      color: #f2f2f2;
      text-align: center;
      padding: 0px 16px;
      text-decoration: none;
      font-size: 17px;
      line-height: 2.5rem;
      margin-top: 1rem;
    }
    .topnav a.logo {
      float: left;
      display: block;
      color: #f2f2f2;
      text-align: center;
      text-decoration: none;
      margin-top: 0;
    }

    .topnav a:hover {
      background-color: #ffec8c;
      color: #71ba91;
    }

    .topnav .logo:hover {
      background-color: transparent;
      /* Asegurarse de que el logo no tenga un fondo al hacer hover */
      color: transparent;
      /* Mantener el color transparente en caso de que el logo contenga texto */
    }

    .topnav a.active {
      background-color: #71ba91;
      color: white;
    }

    .topnav .icon {
      display: none;
    }

    .logo {
      width: 10%;
      padding: 0;
    }
    img{
      width: 100%;
    }
    div.marco{
      width: 80%;
      margin: 0 auto;
      padding: 2rem;
      border:1px solid red;
      border-radius: 1rem;
    }

    @media screen and (max-width: 600px) {
      .topnav a:not(:first-child) {
        display: none;
      }

      .topnav a.icon {
        float: right;
        display: block;
      }
    }

    @media screen and (max-width: 600px) {
      .topnav.responsive {
        position: relative;
      }

      .topnav.responsive .icon {
        position: absolute;
        right: 0;
        top: 0;
      }

      .topnav.responsive a {
        float: none;
        display: block;
        text-align: left;
        line-height: 1rem;
      }

      .topnav a:hover {
        background-color: #a3d8e6;
        color: #333;
      }
      .logo {
      width: 20%;
    }
   iframe{
    height: 300px;
   }

    }
  </style>
</head>

<body>

  <div class="topnav" id="myTopnav">
    <a href="#home"class="logo"><img src="logo.png" alt="" ></a>
    <a href="#news">News</a>
    <a href="#contact">Contact</a>
    <a href="#about">About</a>
    <a href="javascript:void(0);" class="icon" onclick="myFunction()">
      <i class="fa fa-bars"></i>
    </a>
  </div>

  <div style="padding-left:16px">
    <h2>Responsive Topnav Example</h2>
    <p>Resize the browser window to see how it works.</p>
  </div>
<div class="marco">
  <iframe width="100%" height="600px"  src="https://www.youtube.com/embed/4HiFbl3tLCw" title="24 hours relax music and along with a soundly sleeping cat and a cozy fireplace! 🔥" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
</div>
  <script>
    function myFunction() {
      var x = document.getElementById("myTopnav");
      if (x.className === "topnav") {
        x.className += " responsive";
      } else {
        x.className = "topnav";
      }
    }
  </script>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
