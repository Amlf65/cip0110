<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Confección páginas web - CIP - 2023">
<title></title>
<link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
<style>

    figcaption{
        text-align: center;
    }
    figure{
        width: 40%;
        display: block;
        margin: 0 auto;
        border: 1px solid red;
    }
    picture{
        width: 80%;
        display: block;
        margin: 0 auto;
    }
</style>
</head>
<body>
    
    <figure>
        <picture>
            <source media="(min-width:650px)" srcset="../img/Simpson-Lisa.png">
            <source media="(min-width:455px)" srcset="../img/Simpson-Hommer.png">
            <img src="../img/Simpson-Marge.png" alt="Rosas">
        </picture>
        <figcaption>Prueba de picture/caption</figcaption>
    </figure>
</body>
</html>
