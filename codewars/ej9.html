<!-- Cree una función que tome un número entero como argumento y devuelva 
    "Par" para números pares o "Impar" para números impares. -->
<body>
    <script>
        valor=true
        if(evenOrOdd(2)!="Par") valor=false;
        if(evenOrOdd(7)!= "Impar") valor=false;
        if(evenOrOdd(-42)!= "Par") valor=false;
        if(evenOrOdd(-7)!= "Impar") valor=false;
        if(evenOrOdd(0)!= "Par") valor=false;

        if (valor) alert("ok"); else alert("error");

        function evenOrOdd(number) {
            return (number%2==0?"Par":"Impar")
        }
    </script>
</body>
