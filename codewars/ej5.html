<!-- Se le proporciona una matriz de n+1 enteros del 1 al n. 
    Además, hay un único número entero duplicado.

La matriz no está ordenada. -->
<body>
    <script>
        valor = true
        if (findDup([1, 2, 2, 3]) != 2) valor = false;
        if (findDup([1, 3, 2, 5, 4, 5, 7, 6]) != 5) valor = false;
        if (findDup([1, 2, 5, 4, 5, 7, 6]) != 0) valor = false;
        if (findDup([1, 2, 5, 4, 3, 7, 6]) != 0) valor = false;
        if (valor) alert("ok"); else alert("error");
        function findDup(arr) {
            let duplicateValue = 0
            for (i = 1; i < arr.length; i++) {
                if (arr.indexOf(i) > -1) {
                    if (arr.indexOf(arr[i - 1], i) > -1) duplicateValue = arr[i - 1]
                }
            }
            return duplicateValue;
        }
    </script>
</body>
