<!-- Escribe una función que combine dos matrices ordenadas en una sola. 
  Las matrices sólo contienen números enteros. Además, el resultado final 
  debe estar ordenado y no tener duplicados. -->
<body>
  <script>
    valor = true
    if (mergeArrays([1, 3, 5], [2, 4, 6]).toString()!=[1, 2, 3, 4, 5, 6].toString()) valor = false;
    if (mergeArrays([2, 4, 8], [2, 4, 6]).toString()!= [2, 4, 6, 8].toString()) valor = false;
    if (valor) alert("ok"); else alert("error");
    
    function mergeArrays(a, b) {
      // your code here
      let ab = [];
      a.forEach((element) => {
        if (ab.indexOf(element) == -1) ab.push(element)
      });
      b.forEach((element) => {
        if (ab.indexOf(element) == -1) ab.push(element)
      })
      return ab.sort(function (a, b) { return a - b });
    }
  </script>
